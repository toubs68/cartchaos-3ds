name: diag
on:
  workflow_dispatch:
  push:
    branches: [ diag ]
jobs:
  diag:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    steps:
      - name: Inspect 3dsx specs + ld
        run: |
          echo "=== FULL 3dsx.specs ==="
          cat /opt/devkitpro/devkitARM/arm-none-eabi/lib/3dsx.specs
          echo "=== find 3dsx.ld ==="
          find / -name "3dsx.ld" 2>/dev/null | head
          echo "=== find ALL crt0 / 3dsx objects ==="
          find /opt/devkitpro/devkitARM/arm-none-eabi/lib -name "*crt0*.o" -o -name "3dsx*.o" 2>/dev/null | head
          echo "=== armv6k/fpu contents (first 30) ==="
          ls /opt/devkitpro/devkitARM/arm-none-eabi/lib/armv6k/fpu | head -30
          echo "=== how does official 3ds link? 3ds_rules full dump ==="
          cat /opt/devkitpro/devkitARM/3ds_rules
