name: diag_text
on:
  workflow_dispatch:
  push:
    branches: [ diag_text ]
jobs:
  d:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    steps:
      - name: locate + dump citro2d text/font headers
        run: |
          echo "=== find c2d headers ==="
          find / -path "*c2d*" -name "*.h" 2>/dev/null | head -40
          echo "=== find text.h anywhere ==="
          find / -name "text.h" 2>/dev/null | head
          echo "=== find font.h anywhere ==="
          find / -name "font.h" 2>/dev/null | head
          echo "=== grep TextParse across all c2d headers ==="
          find / -path "*c2d*" -name "*.h" -exec grep -l "TextParse" {} \; 2>/dev/null
